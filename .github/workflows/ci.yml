name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: '1'

jobs:
  test:
    name: Test
    runs-on: [self-hosted, Linux, X64, builds]

    if: |
      github.event_name != 'push' ||
      github.event.head_commit == null ||
      (!contains(github.event.head_commit.message, '[skip ci]') &&
       !contains(github.event.head_commit.message, '[ci skip]') &&
       !contains(github.event.head_commit.message, '[no ci]'))
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Single job + no incremental: avoids flaky "could not parse/generate dep info" (.d missing)
      # on self-hosted runners (NFS / high parallelism / cache races).
      - name: Build cargo-spec-lock binary
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo build --release -j 1 --bin cargo-spec-lock

      - name: Test
        run: cargo test --workspace --all-features

      - name: Clippy
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: Format
        run: cargo fmt --all -- --check

  publish:
    name: Release & publish
    needs: test
    runs-on: [self-hosted, Linux, X64, builds]

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (github.event.head_commit == null ||
       (!contains(github.event.head_commit.message, '[skip ci]') &&
        !contains(github.event.head_commit.message, '[ci skip]') &&
        !contains(github.event.head_commit.message, '[no ci]') &&
        !contains(github.event.head_commit.message, '[skip publish]')))
    permissions:
      contents: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for crates.io token
        id: gate
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "⚠️  CARGO_REGISTRY_TOKEN not set, skipping release and crates.io publish"
            echo "do_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "do_release=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        if: steps.gate.outputs.do_release == 'true'
        uses: BTCDecoded/rust-ci/install-rust-toolchain@main
        with:
          toolchain: 1.88.0

      - name: Check for breaking changes (advisory)
        if: steps.gate.outputs.do_release == 'true'
        run: |
          echo "Checking commit messages since last tag for breaking-change hints..."
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMIT_RANGE="${LAST_TAG}..HEAD"
          else
            COMMIT_RANGE="HEAD~20..HEAD"
          fi
          if git log "$COMMIT_RANGE" --pretty=format:"%s" 2>/dev/null | grep -qiE "(breaking|!|major|incompatible)"; then
            echo "⚠️  Possible breaking changes in commits — consider a manual major/minor bump if needed"
            git log "$COMMIT_RANGE" --pretty=format:"  - %s" | grep -iE "(breaking|!|major|incompatible)" || true
          else
            echo "No obvious breaking-change markers in commit subjects"
          fi

      - name: Determine version
        if: steps.gate.outputs.do_release == 'true'
        id: version
        run: |
          CURRENT=$(grep -A 10 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ -z "$CURRENT" ]; then
            echo "Could not read version from [package] in Cargo.toml"
            exit 1
          fi
          if ! echo "$CURRENT" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format: ${CURRENT} (expected X.Y.Z)"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          CURRENT_PATCH=$(echo "$CURRENT" | cut -d. -f3)
          CRATE_NAME=$(grep -A 5 '^\[package\]' Cargo.toml | grep '^name = ' | head -1 | sed -E 's/^name = "([^"]+)".*/\1/')
          echo "Fetching published versions for ${CRATE_NAME} from crates.io..."
          API_RESPONSE=$(curl -sf \
            -H "User-Agent: blvm-ci/1.0 (github.com/BTCDecoded)" \
            "https://crates.io/api/v1/crates/${CRATE_NAME}/versions" 2>/dev/null || echo "")
          PUBLISHED_VERSIONS=""
          if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
            if command -v jq &>/dev/null; then
              PUBLISHED_VERSIONS=$(echo "$API_RESPONSE" | jq -r '.versions[].num' 2>/dev/null || echo "")
            else
              PUBLISHED_VERSIONS=$(echo "$API_RESPONSE" | grep -oE '"num":"[^"]+"' | sed 's/"num":"//;s/"//')
            fi
            echo "Found $(echo "$PUBLISHED_VERSIONS" | wc -l | tr -d ' ') published versions."
          else
            echo "⚠️  crates.io API unavailable — assuming version is free."
          fi
          TAGGED_VERSIONS=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sed 's/^v//' | sed 's/-unverified$//')
          USED_VERSIONS=$(printf '%s\n%s' "$TAGGED_VERSIONS" "$PUBLISHED_VERSIONS" | sort -u | grep -v '^$')
          SAME_LINE_PATCHES=$(printf '%s\n' "$USED_VERSIONS" | grep -E "^${MAJOR}\\.${MINOR}\\.[0-9]+$" | cut -d. -f3 || true)
          MAX_PATCH=$(printf '%s\n' $SAME_LINE_PATCHES "$CURRENT_PATCH" | grep -E '^[0-9]+$' | sort -n | tail -1)
          [ -n "$MAX_PATCH" ] || MAX_PATCH="$CURRENT_PATCH"
          PATCH=$((MAX_PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          while echo "$USED_VERSIONS" | grep -qxF "$VERSION"; do
            echo "Version ${VERSION} already on crates.io or as tag; bumping patch..."
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done
          echo "Version ${VERSION} is available"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update version in Cargo.toml
        if: steps.gate.outputs.do_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bump_version() {
            local f="$1"
            awk -v ver="$VERSION" '
              /^\[package\]/ { in_package = 1; print; next }
              /^\[/ { in_package = 0 }
              in_package && /^version = / {
                print "version = \"" ver "\""
                next
              }
              { print }
            ' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
          }
          bump_version Cargo.toml
          bump_version crates/blvm-spec-lock-core/Cargo.toml
          # Keep path dependency semver aligned with crates.io sibling.
          sed -i "s/blvm-spec-lock-core = { version = \"[^\"]*\"/blvm-spec-lock-core = { version = \"${VERSION}\"/" Cargo.toml
          echo "Updated workspace versions to ${VERSION}"

      - name: Pre-release smoke test
        if: steps.gate.outputs.do_release == 'true'
        run: |
          # Manifest-only: full compile/tests already ran in CI; this catches a bad version-bump edit.
          cargo metadata --format-version 1 --no-deps > /dev/null

      - name: Commit version bump
        if: steps.gate.outputs.do_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml crates/blvm-spec-lock-core/Cargo.toml
          if git diff --staged --quiet; then
            echo "No Cargo.toml changes to commit"
          else
            git commit -m "Bump version to ${{ steps.version.outputs.version }} for release [skip ci]"
            if [ -n "${{ secrets.REPO_ACCESS_TOKEN }}" ]; then
              git remote set-url origin "https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git"
              git push origin "HEAD:${{ github.ref_name }}"
            else
              echo "⚠️  REPO_ACCESS_TOKEN not set — cannot push version bump (set org/repo secret for auto bump on main)"
            fi
          fi

      - name: Configure cargo for crates.io
        if: steps.gate.outputs.do_release == 'true'
        run: cargo login "${CARGO_REGISTRY_TOKEN}"

      - name: Verify package versions
        if: steps.gate.outputs.do_release == 'true'
        run: |
          EXPECTED="${{ steps.version.outputs.version }}"
          ROOT=$(grep -A 10 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          CORE=$(grep '^version = ' crates/blvm-spec-lock-core/Cargo.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          [ "$ROOT" = "$EXPECTED" ] || { echo "Root Cargo.toml mismatch: expected ${EXPECTED}, got ${ROOT}"; exit 1; }
          [ "$CORE" = "$EXPECTED" ] || { echo "Core Cargo.toml mismatch: expected ${EXPECTED}, got ${CORE}"; exit 1; }

      - name: Package metadata
        if: steps.gate.outputs.do_release == 'true'
        run: |
          cargo package -p blvm-spec-lock-core --list --allow-dirty
          cargo package -p blvm-spec-lock --list --allow-dirty

      - name: Dry-run publish
        if: steps.gate.outputs.do_release == 'true'
        run: |
          # Workspace split: blvm-spec-lock depends on blvm-spec-lock-core from crates.io.
          # Main-crate `cargo publish --dry-run` fails until core is on the index, so dry-run
          # only core here; main manifest is checked in Package metadata (--list) and after
          # core is published for real in the Publish step below.
          cargo publish -p blvm-spec-lock-core --dry-run --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Check if version already on crates.io
        if: steps.gate.outputs.do_release == 'true'
        id: check-version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CRATE_NAME=$(grep -E '^name = ' Cargo.toml | head -1 | sed -E 's/^name = "([^"]+)".*/\1/')
          API_RESPONSE=""
          for i in 1 2 3; do
            API_RESPONSE=$(curl -s --max-time 10 "https://crates.io/api/v1/crates/${CRATE_NAME}/versions" 2>/dev/null || echo "")
            [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"' && break
            [ "$i" -lt 3 ] && sleep $((i * 2))
          done
          if [ -z "$API_RESPONSE" ] || echo "$API_RESPONSE" | grep -q '"detail"'; then
            if cargo search "$CRATE_NAME" --limit 100 2>/dev/null | grep -qE "\"${CRATE_NAME}\".*\"${VERSION}\""; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          elif command -v jq &>/dev/null; then
            V=$(echo "$API_RESPONSE" | jq -r ".versions[] | select(.num == \"${VERSION}\") | .num" | head -1)
            if [ "$V" = "$VERSION" ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
          elif echo "$API_RESPONSE" | grep -q "\"num\":\"${VERSION}\""; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.gate.outputs.do_release == 'true'
        id: publish
        run: |
          set +e
          VERSION="${{ steps.version.outputs.version }}"
          ACTUAL_ROOT=$(grep -A 12 '^\[package\]' Cargo.toml | grep '^version = ' | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          ACTUAL_CORE=$(grep '^version = ' crates/blvm-spec-lock-core/Cargo.toml | head -1 | sed -E 's/^version = "([^"]+)".*/\1/')
          if [ "$ACTUAL_ROOT" != "$VERSION" ] || [ "$ACTUAL_CORE" != "$VERSION" ]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "::error::Version mismatch after bump"
            exit 1
          fi
          if [ "${{ steps.check-version.outputs.exists }}" = "true" ]; then
            echo "Version ${VERSION} already on crates.io for blvm-spec-lock, skipping publish"
            echo "published=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PUBLISHED_CORE=false
          PUBLISHED_LOCK=false

          OUT_CORE=$(cargo publish -p blvm-spec-lock-core --token "${CARGO_REGISTRY_TOKEN}" 2>&1)
          CODE_CORE=$?
          echo "$OUT_CORE"
          if [ "$CODE_CORE" -eq 0 ]; then
            PUBLISHED_CORE=true
          elif echo "$OUT_CORE" | grep -qi "already exists"; then
            echo "Note: blvm-spec-lock-core ${VERSION} already on crates.io (continuing)"
            PUBLISHED_CORE=true
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "::error::cargo publish blvm-spec-lock-core failed"
            exit 1
          fi

          sleep 25

          OUT_LOCK=$(cargo publish -p blvm-spec-lock --token "${CARGO_REGISTRY_TOKEN}" 2>&1)
          CODE_LOCK=$?
          echo "$OUT_LOCK"
          if [ "$CODE_LOCK" -eq 0 ]; then
            PUBLISHED_LOCK=true
          elif echo "$OUT_LOCK" | grep -qi "already exists"; then
            echo "Note: blvm-spec-lock ${VERSION} already exists"
            PUBLISHED_LOCK=true
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "::error::cargo publish blvm-spec-lock failed"
            exit 1
          fi

          if [ "$PUBLISHED_CORE" = true ] && [ "$PUBLISHED_LOCK" = true ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            sleep 30
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Final verify blvm-spec-lock on crates.io
        if: steps.gate.outputs.do_release == 'true'
        id: final-verify
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CRATE_NAME=$(grep -E '^name = ' Cargo.toml | head -1 | sed -E 's/^name = "([^"]+)".*/\1/')
          sleep 5
          API_RESPONSE=$(curl -s --max-time 10 "https://crates.io/api/v1/crates/${CRATE_NAME}/versions" 2>/dev/null || echo "")
          if [ -n "$API_RESPONSE" ] && ! echo "$API_RESPONSE" | grep -q '"detail"'; then
            if command -v jq &>/dev/null; then
              V=$(echo "$API_RESPONSE" | jq -r ".versions[] | select(.num == \"${VERSION}\") | .num" | head -1)
              [ "$V" = "$VERSION" ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
            elif echo "$API_RESPONSE" | grep -q "\"num\":\"${VERSION}\""; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "exists=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "exists=${{ steps.check-version.outputs.exists }}" >> "$GITHUB_OUTPUT"
          fi
